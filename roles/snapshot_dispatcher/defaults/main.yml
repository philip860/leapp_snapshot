---
snapshot_skip: false

snapshot_action: check
snapshot_provider: auto
snapshot_set_name: leapp-preupgrade

snapshot_valid_actions:
  - check
  - create
  - remove
  - revert

snapshot_provider_lvm_enabled: true
snapshot_provider_aws_enabled: true
snapshot_provider_vmware_enabled: true
snapshot_provider_kvm_enabled: true
snapshot_provider_baremetal_enabled: true

snapshot_fail_when_unsupported: false